on: [push]
name: Build and Publish to Cloudflare Pages

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        
      - name: Build the project
        run: npm run build

      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: build/web

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download production artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-output
          path: ${{ github.workspace }}/dist

      - name: Set ref_name
        id: ref_name
        run: echo "ref_name=$(echo ${{ github.ref_name }} | sed 's/[^a-z0-9-]/-/g')" >> $GITHUB_OUTPUT

      - name: assert required variables are set
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "Error: CF_API_TOKEN is not set"
            exit 1
          fi
          if [ -z "$CF_ACCOUNT_ID" ]; then
            echo "Error: CF_ACCOUNT_ID is not set"
            exit 1
          fi
          if [ -z "$CF_PAGES_PROJECT_NAME" ]; then
            echo "Error: CF_PAGES_PROJECT_NAME is not set"
            exit 1
          fi

      - name: Publish to Cloudflare Pages (Production)
        if: github.ref_name == 'main'
        run: npx wrangler pages deploy dist --project-name $CF_PAGES_PROJECT_NAME
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
          ref_name: ${{ steps.ref_name.outputs.ref_name }}

      - name: Publish to Cloudflare Pages (Preview)
        if: github.ref_name != 'main'
        run: npx wrangler pages deploy dist --project-name $CF_PAGES_PROJECT_NAME --branch $REF_NAME
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
          REF_NAME: ${{ steps.ref_name.outputs.ref_name }}
